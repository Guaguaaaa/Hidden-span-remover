<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hidden Span Remover</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="row">
      <span class="label">Remove hidden spans</span>
      <label class="switch">
        <input type="checkbox" id="toggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="row">
      <span class="label">Highlight hidden spans</span>
      <label class="switch highlight-switch">
        <input type="checkbox" id="highlightToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <button id="exportMarkdown" class="export-button" type="button">
      Export cleaned Markdown
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
